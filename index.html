<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!--  countdown form-->
<div class="form-area" id="counter-form" hidden>
    <form>
        <div>
            <label>Enter Countdown Title</label>
            <input type="text" name="title" id="counter-title-input" placeholder="What you're counting too">

        </div>

        <div>
            <label>Pick a Date</label>
            <input type="date" name="date-picker" id="counter-date">

        </div>
        <button type="submit">Submit</button>

    </form>
</div>


<!--Main Countdown-->
<div class="counter" id="counter" hidden>
    <h1>Counter Title</h1>
    <ul>
        <li><span>3</span>Days</li>
        <li><span>6</span>Hours</li>
        <li><span>12</span>Minutes</li>
        <li><span>23</span>Seconds</li>

    </ul>
    <button type ="reset" id="counter-reset">Reset</button>
</div>



<!--Completed Screen-->
<div class="complete" id="complete">
    <h1 class="complete-title">Counter Completed!</h1>
    <h1 id="complete-info">Countdown Finished on 07-22-2022</h1>
    <button id="complete-button">New Countdown</button>
</div>


</body>
</html>
